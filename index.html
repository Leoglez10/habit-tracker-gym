<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Disciplina">
    <meta name="theme-color" content="#000000">
    <title>SISTEMA DE DISCIPLINA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Aplica el tema guardado antes de pintar para evitar parpadeo. -->
    <script>const _t = localStorage.getItem('theme'); if (_t) document.documentElement.dataset.theme = _t;</script>
    <style>
        /* Tema MATRIX (por defecto) */
        :root {
            --bg: #000000;
            --accent: #00FF41;
            --fail: #FF0000;
            --warning: #FFD700;
            --rest: #00D0FF;
            --card: #0a0a0a;
            --text: #ffffff;
            --text-dim: #888888;
            --text-faint: #555555;
            --border: #1a1a1a;
            --surface: #111111;
            --badge: #222222;
        }

        /* Tema ARENA (claro, beige/café tipo Claude) */
        [data-theme="arena"] {
            --bg: #f4ede2;
            --accent: #c96442;
            --fail: #b54034;
            --warning: #b8860b;
            --rest: #5b8aa6;
            --card: #fbf7f0;
            --text: #2b2622;
            --text-dim: #6b6258;
            --text-faint: #9b9183;
            --border: #e5dccb;
            --surface: #ece3d4;
            --badge: #e5dccb;
        }

        /* Tema ACERO (gris/negro/blanco mono) */
        [data-theme="acero"] {
            --bg: #0c0c0c;
            --accent: #f5f5f5;
            --fail: #ff5d5d;
            --warning: #bdbdbd;
            --rest: #7fb0c4;
            --card: #151515;
            --text: #f0f0f0;
            --text-dim: #9a9a9a;
            --text-faint: #5a5a5a;
            --border: #262626;
            --surface: #1b1b1b;
            --badge: #242424;
        }

        * { -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            transition: background-color .3s, color .3s;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Respeta el notch y la barra de gestos del móvil en modo app. */
            padding: calc(20px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Racha Gigante */
        .streak-container {
            text-align: center;
            margin-top: 20px;
        }
        .streak-number {
            font-size: 6rem;
            font-family: 'Bebas Neue';
            line-height: 0.8;
            color: var(--accent);
            text-shadow: 0 0 22px var(--accent);
        }
        .streak-label { font-size: 1rem; letter-spacing: 3px; color: var(--text-faint); margin-bottom: 12px; }
        .record-label { font-size: 0.75rem; letter-spacing: 2px; color: var(--text-faint); margin-top: 8px; }
        .record-label b { color: var(--warning); }

        /* Rango */
        .rank-badge {
            background: var(--badge);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            margin-top: 10px;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        /* Preguntas */
        .main-container {
            width: 100%;
            max-width: 450px;
            margin-top: 40px;
        }

        .question-box {
            background: var(--card);
            border: 2px solid var(--border);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            animation: boxIn .35s cubic-bezier(.2, .9, .3, 1.2);
        }
        /* Transición suave al cambiar de pregunta (entrenar -> cardio -> comida). */
        @keyframes boxIn {
            from { opacity: 0; transform: translateY(14px) scale(.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        h2 { font-family: 'Bebas Neue'; font-size: 2.5rem; margin-bottom: 20px; }

        .btn {
            width: 100%;
            padding: 30px;
            margin: 10px 0;
            font-size: 1.5rem;
            font-weight: 900;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform .12s cubic-bezier(.2, .9, .3, 1.4), filter .12s, box-shadow .12s;
            -webkit-user-select: none;
            user-select: none;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.08); }
        /* Feedback táctil: el botón se hunde al tocar y rebota al soltar. */
        .btn:active { transform: scale(0.94); filter: brightness(0.9); }
        .pressed { animation: btnPop .3s ease; }
        @keyframes btnPop {
            0% { transform: scale(.94); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        .btn-yes { 
            background: var(--accent); 
            color: black; 
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }
        .btn-no {
            background: var(--surface);
            color: var(--text-faint);
            border: 1px solid var(--border);
        }
        .btn-no:active { background: var(--fail); color: white; }
        .btn-rest {
            background: #0a1a22;
            color: var(--rest);
            border: 1px solid var(--rest);
            box-shadow: 0 0 12px rgba(0, 200, 255, 0.15);
        }

        /* Calendario Mensual */
        .calendar {
            width: 100%;
            max-width: 450px;
            margin-top: 40px;
        }
        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .cal-title {
            font-family: 'Bebas Neue';
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: var(--text);
        }
        .cal-nav {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--accent);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cal-nav:active { background: var(--border); transform: scale(0.94); }
        .cal-nav:disabled { opacity: 0.25; cursor: default; }
        .cal-weekdays, .history-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            width: 100%;
        }
        .cal-weekdays span {
            text-align: center;
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: var(--text-faint);
            padding-bottom: 6px;
        }
        .history-grid { margin-top: 0; }

        .day-dot {
            aspect-ratio: 1;
            background: var(--surface);
            border-radius: 6px;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-faint);
        }
        .day-dot.empty { background: transparent; }
        .day-dot.today { outline: 2px solid var(--text); outline-offset: -2px; }
        .day-dot.perfect { background: var(--accent); color: black; box-shadow: 0 0 10px var(--accent); }
        .day-dot.legendary {
            color: #4a3500;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700 0%, #FFF1A8 45%, #FFB800 100%);
            background-size: 200% 200%;
            box-shadow: 0 0 12px #FFD700, 0 0 4px #fff inset;
            animation: shiny 2.2s ease-in-out infinite;
        }
        @keyframes shiny {
            0%, 100% { background-position: 0% 50%; box-shadow: 0 0 8px #FFD700, 0 0 4px #fff inset; }
            50%      { background-position: 100% 50%; box-shadow: 0 0 18px #FFD700, 0 0 6px #fff inset; }
        }
        .day-dot.rest { background: var(--rest); color: black; box-shadow: 0 0 10px var(--rest); }
        .day-dot.half { border: 2px solid var(--warning); color: var(--warning); }
        .day-dot.failed {
            background: #2a0000;
            border: 2px solid var(--fail);
            color: var(--fail);
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        }

        .stats-presets, .stats-range {
            display: flex; gap: 8px; flex-wrap: wrap;
            justify-content: center; margin: 12px 0;
        }
        .stats-range { align-items: flex-end; font-size: 0.7rem; color: var(--text-dim); }
        .stats-range label { display: flex; flex-direction: column; gap: 4px; }
        .stats-range input[type="date"] {
            background: var(--surface); color: var(--text);
            border: 1px solid var(--border); border-radius: 6px; padding: 6px;
        }
        .btn-period {
            background: var(--surface); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 8px 14px; cursor: pointer; font-weight: 700; font-size: 0.75rem;
        }
        .btn-period:hover { border-color: var(--accent); }
        .stat-line { margin: 10px 0; text-align: left; }
        .stat-line .stat-top {
            display: flex; justify-content: space-between;
            font-size: 0.8rem; margin-bottom: 4px; color: var(--text-dim);
        }
        .stat-line .stat-top b { color: var(--text); }
        .stat-line .bar { background: var(--surface); border-radius: 6px; height: 10px; overflow: hidden; }
        .stat-line .bar > div { height: 100%; border-radius: 6px; transition: width .4s; }
        .stats-range-lbl { font-size: 0.7rem; color: var(--text-faint); margin-bottom: 8px; }

        .reset-btn {
            margin-top: 20px;
            background: none;
            border: none;
            color: var(--text-faint);
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Barra de progreso al siguiente rango */
        .rank-progress { width: 100%; max-width: 220px; margin: 12px auto 0; }
        .rank-bar { height: 6px; background: var(--border); border-radius: 50px; overflow: hidden; }
        .rank-fill { height: 100%; width: 0; background: var(--accent); box-shadow: 0 0 8px var(--accent); transition: width .4s; }
        .rank-next { font-size: .6rem; letter-spacing: 1px; color: var(--text-faint); margin-top: 6px; }

        /* Estadísticas */
        .stats-row { display: flex; gap: 28px; justify-content: center; margin-top: 16px; }
        .stat { text-align: center; }
        .stat-num { font-family: 'Bebas Neue'; font-size: 1.8rem; color: var(--text); line-height: 1; }
        .stat-lbl { font-size: .55rem; letter-spacing: 1px; color: var(--text-faint); margin-top: 4px; }

        /* Presumir */
        .share-btn {
            margin-top: 18px; background: var(--accent); color: #000; border: none;
            padding: 12px 26px; border-radius: 50px; font-weight: 900; font-size: .85rem;
            letter-spacing: 1px; cursor: pointer; text-transform: uppercase;
        }
        .share-btn:active { transform: scale(.96); filter: brightness(.9); }

        .day-dot.editable { cursor: pointer; }

        /* Backup de datos */
        .data-row { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
        .data-btn {
            flex: 1; max-width: 220px;
            background: var(--surface); color: var(--text);
            border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 16px; cursor: pointer;
            font-size: .8rem; font-weight: 700; letter-spacing: .5px;
            transition: border-color .15s, transform .1s;
        }
        .data-btn:hover { border-color: var(--accent); }
        .data-btn:active { border-color: var(--accent); transform: scale(.97); }

        .auth-bar { display: flex; justify-content: center; margin: 28px 0 36px; min-height: 40px; }
        .google-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: #fff; color: #1f1f1f;
            border: 1px solid #dadce0; border-radius: 10px;
            padding: 10px 18px; cursor: pointer;
            font-size: .85rem; font-weight: 700;
        }
        .google-btn:active { transform: scale(.97); }
        .user-box { display: flex; align-items: center; gap: 10px; font-size: .75rem; color: var(--text-dim); }
        .user-email { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cloud-status { color: var(--accent); font-weight: 700; }
        .cloud-status.saving { color: var(--warning); }
        .logout-btn {
            background: var(--surface); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 6px 12px; cursor: pointer; font-size: .7rem; font-weight: 700;
        }
        .logout-btn:hover { border-color: var(--fail); }

        .hidden { display: none; }

        /* Modal de día (ver / modificar) */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal-overlay.hidden { display: none; }
        .modal-box {
            background: var(--card); border: 2px solid var(--border);
            border-radius: 24px; padding: 28px; width: 100%; max-width: 360px;
            text-align: center;
        }
        .modal-date {
            font-family: 'Bebas Neue'; font-size: 1.8rem; letter-spacing: 2px; color: var(--text);
        }
        .modal-status {
            font-size: 0.95rem; color: var(--text-dim); margin: 12px 0 20px;
            line-height: 1.6; white-space: pre-line;
        }
        .modal-box .btn { padding: 18px; font-size: 1.1rem; }

        /* #1 Banner racha en peligro */
        .danger-banner {
            width: 100%; max-width: 450px; margin: 14px auto 0;
            background: #2a0000; border: 1px solid var(--fail);
            color: var(--fail); border-radius: 14px;
            padding: 12px 16px; text-align: center;
            font-size: .85rem; font-weight: 900; letter-spacing: .5px;
            box-shadow: 0 0 14px rgba(255, 0, 0, 0.35);
            animation: pulseDanger 1.6s ease-in-out infinite;
        }
        @keyframes pulseDanger {
            0%, 100% { box-shadow: 0 0 14px rgba(255, 0, 0, 0.35); }
            50%      { box-shadow: 0 0 22px rgba(255, 0, 0, 0.6); }
        }

        /* #2 Frase diaria */
        .daily-quote {
            max-width: 450px; margin: 18px auto 0; text-align: center;
            font-family: 'Bebas Neue'; font-size: 1.25rem; letter-spacing: 1px;
            color: var(--text-dim); line-height: 1.3; padding: 0 10px;
        }

        /* #4 Proximidad al récord */
        .record-proximity { font-size: .7rem; letter-spacing: 1px; color: var(--warning); margin-top: 6px; min-height: 1em; }

        /* #5 Overlay de hito */
        .milestone-num {
            font-family: 'Bebas Neue'; font-size: 7rem; line-height: .8;
            color: var(--accent); text-shadow: 0 0 30px var(--accent);
        }
        .milestone-msg { font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 2px; color: var(--text); margin-top: 10px; }

        /* Selector de tema */
        .theme-row { display: flex; gap: 14px; justify-content: center; margin-top: 26px; }
        .theme-btn {
            width: 36px; height: 36px; border-radius: 50%; padding: 0;
            border: 2px solid var(--border); cursor: pointer; transition: transform .15s;
        }
        .theme-btn.active { border-color: var(--accent); transform: scale(1.15); }

        /* #6 Progreso del mes */
        .month-progress { width: 100%; max-width: 450px; margin: 0 auto 14px; }
        .month-bar { height: 8px; background: var(--border); border-radius: 50px; overflow: hidden; }
        .month-fill { height: 100%; width: 0; background: var(--accent); box-shadow: 0 0 8px var(--accent); transition: width .4s; }
        .month-lbl { font-size: .6rem; letter-spacing: 1px; color: var(--text-faint); margin-top: 6px; text-align: center; }

        .notif-btn { margin-top: 10px; }
    </style>
</head>
<body>

    <div id="danger-banner" class="danger-banner hidden"></div>

    <div class="streak-container">
        <div class="streak-label">RACHA ACTUAL</div>
        <div class="streak-number" id="streak-count">0</div>
        <div class="rank-badge" id="rank-name">RECLUTA</div>
        <div class="rank-progress">
            <div class="rank-bar"><div class="rank-fill" id="rank-fill"></div></div>
            <div class="rank-next" id="rank-next"></div>
        </div>
        <div class="record-label">RÉCORD: <b id="record-count">0</b> DÍAS</div>
        <div class="record-proximity" id="record-proximity"></div>
        <div class="stats-row">
            <div class="stat"><div class="stat-num" id="stat-good">0</div><div class="stat-lbl">DÍAS CUMPLIDOS</div></div>
            <div class="stat"><div class="stat-num" id="stat-rate">0%</div><div class="stat-lbl">CONSTANCIA</div></div>
        </div>
        <button class="share-btn" onclick="shareStreak()">PRESUMIR 🔥</button>
    </div>

    <div class="daily-quote" id="daily-quote"></div>

    <div class="main-container">
        <div id="q-exercise" class="question-box">
            <h2>¿ENTRENASTE HOY?</h2>
            <button class="btn btn-yes" onclick="logData('exercise', true)">SÍ, LO HICE 💪</button>
            <button class="btn btn-rest" onclick="logData('exercise', 'rest')">DÍA DE DESCANSO 🛌</button>
            <button class="btn btn-no" onclick="logData('exercise', false)">NO, HOY NO</button>
        </div>

        <div id="q-cardio" class="question-box hidden">
            <h2>¿HICISTE CARDIO?</h2>
            <button class="btn btn-yes" onclick="logData('cardio', true)">SÍ, CARDIO 🏃</button>
            <button class="btn btn-no" onclick="logData('cardio', false)">NO, HOY NO</button>
        </div>

        <div id="q-food" class="question-box hidden">
            <h2>¿COMISTE LIMPIO?</h2>
            <button class="btn btn-yes" onclick="logData('food', true)">LO HICE 🥗</button>
            <button class="btn btn-no" onclick="logData('food', false)">NO, BASURA :(</button>
        </div>

        <div id="finished" class="question-box hidden">
            <h2 id="final-msg">DÍA REGISTRADO</h2>
            <button class="reset-btn" onclick="resetToday()">Corregir error de hoy</button>
        </div>
    </div>

    <div class="calendar">
        <div class="cal-header">
            <button class="cal-nav" id="cal-prev" onclick="changeMonth(-1)" aria-label="Mes anterior">‹</button>
            <div class="cal-title" id="cal-title" onclick="goToday()"></div>
            <button class="cal-nav" id="cal-next" onclick="changeMonth(1)" aria-label="Mes siguiente">›</button>
        </div>
        <div class="cal-weekdays">
            <span>L</span><span>M</span><span>X</span><span>J</span><span>V</span><span>S</span><span>D</span>
        </div>
        <div class="month-progress">
            <div class="month-bar"><div class="month-fill" id="month-fill"></div></div>
            <div class="month-lbl" id="month-lbl"></div>
        </div>
        <div class="history-grid" id="history-grid"></div>
        <button class="reset-btn hidden" id="cal-today" onclick="goToday()" style="display:none">↩ VOLVER A HOY</button>
    </div>

    <div id="milestone-modal" class="modal-overlay hidden" onclick="closeMilestone()">
        <div class="modal-box">
            <div class="milestone-num" id="milestone-num"></div>
            <div class="milestone-msg" id="milestone-msg"></div>
            <button class="btn btn-yes" style="margin-top:24px" onclick="closeMilestone()">SIGO 🔥</button>
        </div>
    </div>

    <div id="day-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeDayModal()">
        <div class="modal-box">
            <div class="modal-date" id="modal-date"></div>
            <div class="modal-status" id="modal-status"></div>
            <div id="modal-view">
                <button class="btn btn-yes" onclick="openEdit()">MODIFICAR ✏️</button>
                <button class="btn btn-no" onclick="closeDayModal()">SOLO VER, CERRAR</button>
            </div>
            <div id="modal-edit" class="hidden">
                <button class="btn btn-yes" onclick="setDay('legendary')">DÍA PERFECTO ✨</button>
                <button class="btn btn-yes" onclick="setDay('perfect')">ENTRENO + COMIDA 💪</button>
                <button class="btn btn-rest" onclick="setDay('rest')">DESCANSO 🛌</button>
                <button class="btn btn-no" onclick="setDay('failed')">DÍA FALLADO ❌</button>
                <button class="reset-btn" onclick="setDay('clear')">Borrar este día</button>
            </div>
        </div>
    </div>

    <div id="stats-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeStats()">
        <div class="modal-box">
            <div class="modal-date">📊 ESTADÍSTICAS</div>
            <div class="stats-presets">
                <button class="btn-period" onclick="statsPreset('week')">SEMANA</button>
                <button class="btn-period" onclick="statsPreset('fortnight')">QUINCENA</button>
                <button class="btn-period" onclick="statsPreset('month')">MES</button>
            </div>
            <div class="stats-range">
                <label>Desde <input type="date" id="stats-from"></label>
                <label>Hasta <input type="date" id="stats-to"></label>
                <button class="btn-period" onclick="statsCustom()">VER RANGO</button>
            </div>
            <div id="stats-report"></div>
            <button class="btn btn-no" style="margin-top:18px" onclick="closeStats()">CERRAR</button>
        </div>
    </div>

    <div class="data-row">
        <button class="data-btn" onclick="openStats()">📊 ESTADÍSTICAS</button>
    </div>
    <div class="data-row" id="backup-row">
        <button class="data-btn" onclick="exportData()">⬇ EXPORTAR COPIA</button>
        <button class="data-btn" onclick="document.getElementById('import-file').click()">⬆ IMPORTAR</button>
        <input type="file" id="import-file" accept="application/json,.json" class="hidden" onchange="importData(this)">
    </div>
    <div class="theme-row">
        <button class="theme-btn" data-theme-val="matrix" title="Matrix"
                style="background:linear-gradient(135deg,#000 50%,#00FF41 50%)" onclick="setTheme('matrix')"></button>
        <button class="theme-btn" data-theme-val="arena" title="Arena"
                style="background:linear-gradient(135deg,#f4ede2 50%,#c96442 50%)" onclick="setTheme('arena')"></button>
        <button class="theme-btn" data-theme-val="acero" title="Acero"
                style="background:linear-gradient(135deg,#0c0c0c 50%,#f5f5f5 50%)" onclick="setTheme('acero')"></button>
    </div>

    <div class="data-row notif-btn">
        <button class="data-btn" id="notif-btn" onclick="enableReminders()">🔔 ACTIVAR RECORDATORIO</button>
    </div>

    <div id="auth-bar" class="auth-bar">
        <button id="login-btn" class="google-btn hidden" onclick="loginGoogle()">
            <svg viewBox="0 0 48 48" width="18" height="18" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.5-2.1 14.3-5.6l-6.6-5.6C29.6 34.6 26.9 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.4l6.6 5.6C41.4 35.8 44 30.3 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
            Entrar con Google
        </button>
        <div id="user-box" class="user-box hidden">
            <span id="user-email" class="user-email"></span>
            <span id="cloud-status" class="cloud-status">☁️ Guardado</span>
            <button class="logout-btn" onclick="logout()">Salir</button>
        </div>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('disciplineLog')) || {};

        // ---- Supabase: rellena estos 2 valores (Settings -> API en tu proyecto) ----
        const SUPABASE_URL  = 'https://dhecaywifmfikmtdecxq.supabase.co';
        const SUPABASE_ANON = 'sb_publishable_c94tRettdEWk50XmfYnoGg_EQFcd99N';
        // Si no está configurado (o no cargó la librería), la app funciona solo-local.
        const sb = (SUPABASE_URL.includes('TU-PROYECTO') || typeof supabase === 'undefined')
                 ? null : supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        let user = null;
        let syncT = null;

        // Fecha en formato YYYY-MM-DD usando hora LOCAL (no UTC),
        // para que "hoy" no se descuadre cerca de medianoche.
        function localKey(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        const today = localKey(new Date());
        // Reanuda respuestas parciales si recargaste a mitad del registro.
        let currentDay = history[today] || { exercise: null, cardio: null, food: null };

        function logData(type, value) {
            currentDay[type] = value;
            persist(); // guarda tras cada respuesta (no se pierde al recargar)
            if (type === 'exercise') {
                document.getElementById('q-exercise').classList.add('hidden');
                // Solo se pregunta cardio si entrenaste; descanso/no salta a comida.
                if (value === true) document.getElementById('q-cardio').classList.remove('hidden');
                else document.getElementById('q-food').classList.remove('hidden');
            } else if (type === 'cardio') {
                document.getElementById('q-cardio').classList.add('hidden');
                document.getElementById('q-food').classList.remove('hidden');
            } else {
                flashDone();
                // ¡Día perfecto (entrenar + cardio + comer)! → confetti.
                if (currentDay.exercise === true && currentDay.cardio && currentDay.food) confetti();
                updateUI();
            }
        }

        function persist() {
            history[today] = currentDay;
            saveHistory();
        }

        // Guarda en local SIEMPRE y, si hay sesión, sube a la nube con debounce.
        function saveHistory() {
            localStorage.setItem('disciplineLog', JSON.stringify(history));
            if (!sb || !user) return;
            setCloudStatus('saving');
            clearTimeout(syncT);
            syncT = setTimeout(pushCloud, 1200);
        }

        async function pushCloud() {
            if (!sb || !user) return;
            const { error } = await sb.from('tracker_data').upsert({
                user_id: user.id, data: history, updated_at: new Date().toISOString()
            });
            setCloudStatus(error ? 'offline' : 'saved');
        }

        async function pullCloud() {
            if (!sb || !user) return;
            const { data, error } = await sb.from('tracker_data')
                .select('data').eq('user_id', user.id).maybeSingle();
            if (error) { setCloudStatus('offline'); return; }
            const remote = (data && data.data) || {};
            // Dispositivo actual gana en conflicto; nunca se pierden días de un solo lado.
            history = { ...remote, ...history };
            saveHistory();   // sube el resultado del merge
            updateUI();
        }

        function setCloudStatus(state) {
            const el = document.getElementById('cloud-status');
            if (!el) return;
            el.classList.toggle('saving', state === 'saving');
            el.innerText = state === 'saving' ? '☁️ Guardando…'
                         : state === 'offline' ? '⚠️ Sin conexión'
                         : '☁️ Guardado';
        }

        function loginGoogle() {
            if (!sb) { alert('Falta configurar Supabase en el código.'); return; }
            sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: location.href.split('#')[0] }
            });
        }

        function logout() {
            if (sb) sb.auth.signOut(); // no borra localStorage: es la caché offline
        }

        // Pinta la barra según haya sesión o no.
        function renderAuth() {
            const login = document.getElementById('login-btn');
            const box   = document.getElementById('user-box');
            const backup = document.getElementById('backup-row');
            if (!sb) { login.classList.add('hidden'); box.classList.add('hidden'); return; }
            if (user) {
                login.classList.add('hidden');
                box.classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email || '';
                backup.classList.add('hidden');   // con nube no hacen falta copias manuales
            } else {
                login.classList.remove('hidden');
                box.classList.add('hidden');
                backup.classList.remove('hidden');
            }
        }

        function onAuth(session) {
            user = session ? session.user : null;
            renderAuth();
            if (user) pullCloud();
        }

        async function resetToday() {
            if (!confirm('¿Borrar el registro de hoy y empezar de nuevo?')) return;
            delete history[today];
            localStorage.setItem('disciplineLog', JSON.stringify(history));
            clearTimeout(syncT);
            await pushCloud(); // sube el borrado ANTES de recargar (si no, pullCloud lo resucita)
            location.reload();
        }

        // Feedback al cerrar el día: parpadeo verde + vibración en móvil.
        function flashDone() {
            if (navigator.vibrate) navigator.vibrate(60);
            const flash = document.createElement('div');
            flash.style.cssText =
                'position:fixed;inset:0;background:var(--accent);opacity:.35;' +
                'pointer-events:none;transition:opacity .5s;z-index:9999';
            document.body.appendChild(flash);
            requestAnimationFrame(() => { flash.style.opacity = '0'; });
            setTimeout(() => flash.remove(), 600);
        }

        // Confetti sin librería: lanza N trozos de papel que caen y se desvanecen.
        function confetti() {
            if (navigator.vibrate) navigator.vibrate([40, 40, 80]);
            const colors = ['#FFD700', '#FF4d4d', '#4dff88', '#4db8ff', '#ff7ad9', '#fff'];
            const N = 90;
            for (let i = 0; i < N; i++) {
                const p = document.createElement('div');
                const size = 6 + Math.random() * 8;
                p.style.cssText =
                    'position:fixed;top:-20px;z-index:99999;pointer-events:none;' +
                    'left:' + Math.random() * 100 + 'vw;' +
                    'width:' + size + 'px;height:' + (size * 0.5) + 'px;' +
                    'background:' + colors[i % colors.length] + ';' +
                    'border-radius:2px;opacity:1;' +
                    'transform:rotate(' + Math.random() * 360 + 'deg);';
                document.body.appendChild(p);
                const fall = 90 + Math.random() * 20;      // vh a caer
                const drift = (Math.random() - 0.5) * 40;  // deriva horizontal
                const dur = 2200 + Math.random() * 1500;
                p.animate([
                    { transform: p.style.transform, opacity: 1 },
                    { transform: 'translate(' + drift + 'vw,' + fall + 'vh) rotate(' + (Math.random() * 720) + 'deg)', opacity: 0 }
                ], { duration: dur, easing: 'cubic-bezier(.2,.6,.4,1)' });
                setTimeout(() => p.remove(), dur);
            }
        }

        // Rebote al soltar cualquier botón (delegado, 1 listener para todos).
        document.addEventListener('click', (e) => {
            const b = e.target.closest('.btn, .data-btn, .btn-period, .google-btn, .logout-btn');
            if (!b) return;
            b.classList.remove('pressed');
            void b.offsetWidth;            // reinicia la animación si se repite
            b.classList.add('pressed');
            setTimeout(() => b.classList.remove('pressed'), 300);
        });

        function updateUI() {
            const c = currentDay;
            // El día está completo cuando hay comida y, si entrenó, también respondió cardio.
            const done = c.food !== null && (c.exercise !== true || c.cardio !== null);
            const ex = document.getElementById('q-exercise');
            const ca = document.getElementById('q-cardio');
            const fo = document.getElementById('q-food');
            const fin = document.getElementById('finished');
            ex.classList.add('hidden'); ca.classList.add('hidden');
            fo.classList.add('hidden'); fin.classList.add('hidden');
            if (done) {
                fin.classList.remove('hidden');
                document.getElementById('final-msg').innerText = finalMessage();
            } else if (c.exercise === null) {
                // Sin registro hoy (p.ej. borrado desde el calendario): vuelve a la 1ª pregunta.
                ex.classList.remove('hidden');
            } else if (c.exercise === true && c.cardio === null) {
                // Entrenó pero falta cardio.
                ca.classList.remove('hidden');
            } else {
                // Falta comida.
                fo.classList.remove('hidden');
            }
            renderStats();
            renderGrid();
        }

        // Mensaje al cerrar el día, según lo que hiciste.
        function finalMessage() {
            const d = currentDay;
            if (d.exercise === true && d.cardio && d.food) return 'DÍA PERFECTO ✨🔥';
            if (d.exercise === true && d.food) return 'DÍA CONQUISTADO 🔥';
            if (d.exercise === 'rest' && d.food) return 'DESCANSO MERECIDO 🛌';
            if (d.exercise === true || d.exercise === 'rest' || d.food) return 'A MEDIAS. MAÑANA TODO.';
            return 'DÍA PERDIDO. LEVÁNTATE.';
        }

        // ¿El día cuenta para la racha? Comiste bien Y (entrenaste O descansaste).
        // El día de descanso planeado NO rompe la racha.
        function isGood(day) {
            return !!(day && day.food && (day.exercise === true || day.exercise === 'rest'));
        }

        // Escalera de rangos (largo plazo). min = racha necesaria para alcanzarlo.
        const RANKS = [
            { name: 'RECLUTA',   min: 0   },
            { name: 'GUERRERO',  min: 4   },
            { name: 'ESPARTANO', min: 11  },
            { name: 'GLADIADOR', min: 21  },
            { name: 'LEYENDA',   min: 35  },
            { name: 'TITÁN',     min: 50  },
            { name: 'INMORTAL',  min: 75  },
            { name: 'DIOS',      min: 100 },
        ];
        function rankInfo(streak) {
            let i = 0;
            for (let j = 0; j < RANKS.length; j++) if (streak >= RANKS[j].min) i = j;
            return { current: RANKS[i], next: RANKS[i + 1] || null };
        }

        // ponytail: self-check silencioso de rangos (falla ruidoso en consola si rompo la escalera)
        (function () {
            console.assert(rankInfo(0).current.name === 'RECLUTA', 'rank 0');
            console.assert(rankInfo(5).current.name === 'GUERRERO', 'rank 5');
            console.assert(rankInfo(200).next === null, 'rank max sin next');
        })();

        function renderStats() {
            // Racha ACTUAL: días válidos consecutivos en el calendario,
            // empezando hoy (o ayer si hoy aún no se registra). Cualquier
            // hueco o día no-válido la rompe.
            let streak = 0;
            const t = history[today];
            const todayComplete = t && t.exercise !== null && t.food !== null;

            if (todayComplete && !isGood(t)) {
                // Cerraste el día de hoy y NO cuenta: la racha se rompe a 0.
                streak = 0;
            } else {
                // Hoy válido, o aún sin terminar/registrar: mide racha consecutiva.
                let cursor = new Date();
                if (!isGood(t)) cursor.setDate(cursor.getDate() - 1); // gracia: hasta ayer
                while (isGood(history[localKey(cursor)])) {
                    streak++;
                    cursor.setDate(cursor.getDate() - 1);
                }
            }

            // RÉCORD histórico: racha consecutiva más larga de todo el historial.
            let best = 0, run = 0, prev = null;
            const days = Object.keys(history).sort();
            for (const k of days) {
                if (!isGood(history[k])) { run = 0; prev = k; continue; }
                if (prev !== null) {
                    const gap = (new Date(k) - new Date(prev)) / 86400000;
                    run = (isGood(history[prev]) && Math.round(gap) === 1) ? run + 1 : 1;
                } else {
                    run = 1;
                }
                if (run > best) best = run;
                prev = k;
            }
            best = Math.max(best, streak);

            document.getElementById('streak-count').innerText = streak;
            document.getElementById('record-count').innerText = best;

            // Motivación: banner de peligro, proximidad al récord, hito alcanzado.
            updateDanger(streak, t, todayComplete);
            updateRecordProximity(streak, best);
            checkMilestone(streak);

            // Rango + barra de progreso al siguiente
            const { current, next } = rankInfo(streak);
            document.getElementById('rank-name').innerText = current.name;
            const fill = document.getElementById('rank-fill');
            const nextLabel = document.getElementById('rank-next');
            if (next) {
                const pct = Math.round((streak - current.min) / (next.min - current.min) * 100);
                fill.style.width = pct + '%';
                nextLabel.innerText = `FALTAN ${next.min - streak} PARA ${next.name}`;
            } else {
                fill.style.width = '100%';
                nextLabel.innerText = 'RANGO MÁXIMO 👑';
            }

            // Stats: días cumplidos (válidos) y constancia (% sobre días cerrados)
            let good = 0, logged = 0;
            for (const k of days) {
                const d = history[k];
                if (!d || d.exercise === null || d.food === null) continue; // día a medias no cuenta
                logged++;
                if (isGood(d)) good++;
            }
            document.getElementById('stat-good').innerText = good;
            document.getElementById('stat-rate').innerText = (logged ? Math.round(good / logged * 100) : 0) + '%';
        }

        // Mes que se está viendo en el calendario (1º del mes actual por defecto).
        const MESES = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO',
                       'JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
        let viewMonth = new Date();
        viewMonth.setDate(1);

        function changeMonth(delta) {
            viewMonth.setMonth(viewMonth.getMonth() + delta);
            renderGrid();
        }
        function goToday() {
            viewMonth = new Date();
            viewMonth.setDate(1);
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('history-grid');
            grid.innerHTML = '';

            const year = viewMonth.getFullYear();
            const month = viewMonth.getMonth();
            document.getElementById('cal-title').innerText = `${MESES[month]} ${year}`;

            // Deshabilita "›" si ya estamos en el mes actual (no hay futuro que ver).
            const now = new Date();
            const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();
            document.getElementById('cal-next').disabled = isCurrentMonth;
            document.getElementById('cal-today').style.display = isCurrentMonth ? 'none' : 'block';

            // Celdas vacías hasta el primer día (lunes = columna 0).
            const firstDay = new Date(year, month, 1);
            let offset = (firstDay.getDay() + 6) % 7; // getDay: 0=domingo -> lunes primero
            for (let i = 0; i < offset; i++) {
                const blank = document.createElement('div');
                blank.className = 'day-dot empty';
                grid.appendChild(blank);
            }

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let day = 1; day <= daysInMonth; day++) {
                const d = new Date(year, month, day);
                const dayStr = localKey(d);
                const data = history[dayStr];

                const dot = document.createElement('div');
                dot.className = 'day-dot';
                dot.innerText = day;

                if (dayStr === today) dot.classList.add('today');

                if (data) {
                    if (data.exercise === true && data.cardio && data.food) dot.classList.add('legendary');
                    else if (data.exercise === true && data.food) dot.classList.add('perfect');
                    else if (data.exercise === 'rest' && data.food) dot.classList.add('rest');
                    else if (data.exercise || data.food) dot.classList.add('half');
                    else dot.classList.add('failed');
                }

                // Días de hoy o pasados: tap abre modal (ver / modificar). Futuro no.
                if (d <= new Date()) {
                    dot.classList.add('editable');
                    dot.onclick = () => openDayModal(dayStr);
                }
                grid.appendChild(dot);
            }

            updateMonthProgress(year, month, daysInMonth);
        }

        // #6 Progreso del mes: % de días cumplidos sobre días transcurridos.
        function updateMonthProgress(year, month, daysInMonth) {
            const now = new Date();
            let elapsed = daysInMonth;
            if (year === now.getFullYear() && month === now.getMonth()) elapsed = now.getDate();
            else if (year > now.getFullYear() || (year === now.getFullYear() && month > now.getMonth())) elapsed = 0;

            let good = 0;
            for (let day = 1; day <= elapsed; day++) {
                if (isGood(history[localKey(new Date(year, month, day))])) good++;
            }
            const pct = elapsed ? Math.round(good / elapsed * 100) : 0;
            document.getElementById('month-fill').style.width = pct + '%';
            document.getElementById('month-lbl').innerText =
                elapsed ? `ESTE MES: ${good}/${elapsed} DÍAS · ${pct}%` : 'MES FUTURO';
        }

        // Tap en un día del calendario: abre modal para VER o MODIFICAR.
        let modalKey = null;

        // Resume en texto qué se hizo ese día.
        function statusText(data) {
            if (!data || (data.exercise === null && data.food === null)) return 'Sin registro este día.';
            const ex = data.exercise === true   ? 'Entrenaste 💪'
                     : data.exercise === 'rest' ? 'Día de descanso 🛌'
                     : data.exercise === false  ? 'No entrenaste ❌'
                     :                            'Entreno sin registrar';
            const fo = data.food === true  ? 'Comiste limpio 🥗'
                     : data.food === false ? 'Comiste basura 🍔'
                     :                       'Comida sin registrar';
            const ca = data.cardio === true  ? 'Cardio ✅ 🏃'
                     : data.cardio === false ? 'Sin cardio'
                     :                         null; // null: no se preguntó (descanso/no entreno)
            return [ex, ca, fo].filter(Boolean).join('\n');
        }

        function openDayModal(key) {
            modalKey = key;
            const [y, m, dd] = key.split('-');
            document.getElementById('modal-date').innerText = `${dd} ${MESES[+m - 1]} ${y}`;
            document.getElementById('modal-status').innerText = statusText(history[key]);
            document.getElementById('modal-view').classList.remove('hidden');
            document.getElementById('modal-edit').classList.add('hidden');
            document.getElementById('day-modal').classList.remove('hidden');
        }

        function openEdit() {
            document.getElementById('modal-view').classList.add('hidden');
            document.getElementById('modal-edit').classList.remove('hidden');
        }

        function closeDayModal() {
            document.getElementById('day-modal').classList.add('hidden');
            modalKey = null;
        }

        // Aplica un estado al día seleccionado en el modal.
        function setDay(state) {
            const map = {
                legendary: { exercise: true,   cardio: true,  food: true  },
                perfect:   { exercise: true,   cardio: false, food: true  },
                rest:      { exercise: 'rest', cardio: null,  food: true  },
                failed:    { exercise: false,  cardio: null,  food: false },
            };
            if (state === 'clear') delete history[modalKey];
            else history[modalKey] = map[state];
            saveHistory();

            // Si edité HOY, sincroniza el flujo de preguntas.
            if (modalKey === today) currentDay = history[today] || { exercise: null, cardio: null, food: null };
            if (navigator.vibrate) navigator.vibrate(30);
            closeDayModal();
            if (state === 'legendary') confetti();
            updateUI();
        }

        // Backup: descarga todo el historial como JSON.
        function exportData() {
            const blob = new Blob([JSON.stringify(history, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `disciplina-${today}.json`; a.click();
            URL.revokeObjectURL(url);
        }

        // Restaura desde un JSON exportado. Fusiona: lo importado pisa por fecha,
        // conserva días que solo existen en local. No borra nada por accidente.
        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const data = JSON.parse(reader.result);
                    if (typeof data !== 'object' || data === null || Array.isArray(data)) throw 0;
                    Object.assign(history, data);
                    saveHistory();
                    currentDay = history[today] || { exercise: null, cardio: null, food: null };
                    updateUI();
                    alert('Datos importados ✓');
                } catch (e) {
                    alert('Archivo inválido');
                }
                input.value = ''; // permite reimportar el mismo archivo
            };
            reader.readAsText(file);
        }

        // ---- Estadísticas por periodo ----
        // Cuenta métricas sobre los días con registro entre fromKey y toKey (inclusive).
        // Las claves YYYY-MM-DD se comparan como string (orden lexicográfico == cronológico).
        function computeStats(data, fromKey, toKey) {
            const s = { dias: 0, comidas: 0, cardios: 0, entrenos: 0, entrenosPerfectos: 0, diasPerfectos: 0 };
            for (const k in data) {
                if (k < fromKey || k > toKey) continue;
                const d = data[k];
                if (!d) continue;
                s.dias++;
                if (d.food === true) s.comidas++;
                if (d.cardio === true) s.cardios++;
                if (d.exercise === true) s.entrenos++;
                if (d.exercise === true && d.cardio === true) s.entrenosPerfectos++;
                if (d.exercise === true && d.cardio && d.food) s.diasPerfectos++;
            }
            return s;
        }

        function openStats() {
            document.getElementById('stats-report').innerHTML = '';
            document.getElementById('stats-modal').classList.remove('hidden');
            statsPreset('month'); // resumen por defecto
        }
        function closeStats() {
            document.getElementById('stats-modal').classList.add('hidden');
        }

        function statsPreset(kind) {
            const to = new Date();
            const from = new Date();
            if (kind === 'week') from.setDate(to.getDate() - 6);
            else if (kind === 'fortnight') from.setDate(to.getDate() - 14);
            else from.setDate(1); // mes: desde el día 1 del mes actual
            const fromKey = localKey(from), toKey = localKey(to);
            document.getElementById('stats-from').value = fromKey;
            document.getElementById('stats-to').value = toKey;
            renderStatsReport(fromKey, toKey);
        }

        function statsCustom() {
            let fromKey = document.getElementById('stats-from').value;
            let toKey = document.getElementById('stats-to').value;
            if (!fromKey || !toKey) { alert('Elige las dos fechas'); return; }
            if (fromKey > toKey) [fromKey, toKey] = [toKey, fromKey]; // por si las invierte
            renderStatsReport(fromKey, toKey);
        }

        function renderStatsReport(fromKey, toKey) {
            const s = computeStats(history, fromKey, toKey);
            const fmt = k => { const [y, m, d] = k.split('-'); return `${d} ${MESES[+m - 1].slice(0, 3)}`; };
            const base = s.dias || 1; // evita /0; con 0 días todo sale 0%
            const c = getComputedStyle(document.documentElement);
            const accent = c.getPropertyValue('--accent').trim();
            const rest = c.getPropertyValue('--rest').trim();
            const rows = [
                ['Días registrados', s.dias, s.dias, accent],
                ['Comiste limpio 🥗', s.comidas, base, accent],
                ['Cardio 🏃', s.cardios, base, rest],
                ['Entrenamientos 💪', s.entrenos, base, accent],
                ['Entrenos perfectos (cardio+pesas)', s.entrenosPerfectos, base, rest],
                ['Días perfectos ✨ (las 3)', s.diasPerfectos, base, '#FFD700'],
            ];
            let html = `<div class="stats-range-lbl">${fmt(fromKey)} → ${fmt(toKey)}</div>`;
            for (const [label, num, max, color] of rows) {
                const pct = Math.round(num / (max || 1) * 100);
                html += `<div class="stat-line"><div class="stat-top"><span>${label}</span>` +
                        `<b>${num}</b></div><div class="bar"><div style="width:${pct}%;background:${color}"></div></div></div>`;
            }
            document.getElementById('stats-report').innerHTML = html;
        }

        // ponytail: self-check del conteo (falla ruidoso en consola si rompo computeStats)
        (function statsSelfCheck() {
            const t = {
                '2026-01-01': { exercise: true,   cardio: true,  food: true  }, // perfecto
                '2026-01-02': { exercise: true,   cardio: false, food: true  }, // entreno+comida
                '2026-01-03': { exercise: 'rest', cardio: null,  food: true  }, // descanso+comida
                '2026-01-04': { exercise: false,  cardio: null,  food: false }, // fallado
                '2025-12-31': { exercise: true,   cardio: true,  food: true  }, // fuera de rango
            };
            const r = computeStats(t, '2026-01-01', '2026-01-04');
            console.assert(r.dias === 4 && r.comidas === 3 && r.cardios === 1 &&
                r.entrenos === 2 && r.entrenosPerfectos === 1 && r.diasPerfectos === 1,
                'computeStats roto', r);
        })();

        // Genera una imagen 1080x1080 de la racha y la comparte (o descarga).
        async function shareStreak() {
            const streak = document.getElementById('streak-count').innerText;
            const rank   = document.getElementById('rank-name').innerText;
            const record = document.getElementById('record-count').innerText;

            // Colores del tema activo, para que la imagen compartida combine.
            const css = getComputedStyle(document.documentElement);
            const BG = css.getPropertyValue('--bg').trim() || '#000';
            const ACC = css.getPropertyValue('--accent').trim() || '#00FF41';
            const DIM = css.getPropertyValue('--text-dim').trim() || '#666';
            const FAINT = css.getPropertyValue('--text-faint').trim() || '#555';

            await document.fonts.ready; // asegura que las fuentes estén listas antes de pintar
            const c = document.createElement('canvas');
            c.width = c.height = 1080;
            const x = c.getContext('2d');
            x.fillStyle = BG; x.fillRect(0, 0, 1080, 1080);
            x.textAlign = 'center';

            x.fillStyle = DIM; x.font = '40px Inter, sans-serif';
            x.fillText('RACHA ACTUAL', 540, 300);

            x.fillStyle = ACC;
            x.shadowColor = ACC; x.shadowBlur = 70;
            x.font = '900 400px Inter, sans-serif';
            x.fillText(streak, 540, 640);
            x.shadowBlur = 0;

            x.fillStyle = ACC; x.font = '700 70px Inter, sans-serif';
            x.fillText(rank, 540, 770);
            x.fillStyle = FAINT; x.font = '36px Inter, sans-serif';
            x.fillText('RÉCORD: ' + record + ' DÍAS', 540, 840);
            x.fillStyle = FAINT; x.font = '900 46px Inter, sans-serif';
            x.fillText('SISTEMA DE DISCIPLINA', 540, 1010);

            c.toBlob(async (blob) => {
                const file = new File([blob], 'racha.png', { type: 'image/png' });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try { await navigator.share({ files: [file], title: 'Mi racha 🔥' }); return; }
                    catch (e) { if (e.name === 'AbortError') return; } // usuario canceló
                }
                // Fallback: descarga la imagen.
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'racha.png'; a.click();
                URL.revokeObjectURL(url);
            }, 'image/png');
        }

        // ===== MOTIVACIÓN =====

        // #1 Banner racha en peligro: hoy sin cerrar bien, racha viva, y ya es tarde.
        function updateDanger(streak, t, todayComplete) {
            const banner = document.getElementById('danger-banner');
            const late = new Date().getHours() >= 15;
            const enRiesgo = streak >= 1 && !isGood(t) && !todayComplete && late;
            if (enRiesgo) {
                banner.innerText = `⚠️ TU RACHA DE ${streak} DÍAS MUERE A MEDIANOCHE. CIERRA EL DÍA.`;
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }
        }

        // #4 Proximidad al récord.
        function updateRecordProximity(streak, best) {
            const el = document.getElementById('record-proximity');
            if (streak > 0 && streak >= best) el.innerText = '🏆 ¡ESTÁS EN TU RÉCORD! NO PARES';
            else if (streak > 0 && best - streak <= 3) el.innerText = `🔥 A ${best - streak} DE TU RÉCORD`;
            else el.innerText = '';
        }

        // #2 Frase diaria: misma frase todo el día, rota por fecha.
        const QUOTES = [
            'EL DOLOR ES TEMPORAL. RENDIRSE ES PARA SIEMPRE.',
            'NADIE VIENE A SALVARTE. LEVÁNTATE.',
            'DISCIPLINA ES HACER LO QUE ODIAS COMO SI LO AMARAS.',
            'NO CUENTES LOS DÍAS. HAZ QUE LOS DÍAS CUENTEN.',
            'TU ÚNICA COMPETENCIA ES QUIEN FUISTE AYER.',
            'LAS EXCUSAS NO QUEMAN CALORÍAS.',
            'SUDA AHORA. BRILLA DESPUÉS.',
            'EL CUERPO LOGRA LO QUE LA MENTE CREE.',
            'CADA REP TE ACERCA. CADA EXCUSA TE ALEJA.',
            'NO ESTÁS CANSADO. ESTÁS DÉBIL DE MENTE.',
            'HAZLO POR EL QUE QUIERES SER, NO POR EL QUE ERES.',
            'LA MOTIVACIÓN TE ARRANCA. EL HÁBITO TE MANTIENE.',
            'GANAR DUELE MENOS QUE ARREPENTIRSE.',
            'SI FUERA FÁCIL, LO HARÍA CUALQUIERA.',
            'LA CONSTANCIA VENCE AL TALENTO.',
            'NO BUSQUES EXCUSAS, BUSCA RESULTADOS.',
            'EL ÉXITO EMPIEZA DONDE TERMINA TU ZONA DE CONFORT.',
            'UN DÍA MÁS, UNA VICTORIA MÁS.',
            'TU CUERPO ESCUCHA TODO LO QUE TU MENTE DICE.',
            'NO TIENES QUE SER EL MEJOR, SOLO MEJOR QUE AYER.',
            'EL SUDOR DE HOY ES LA FUERZA DE MAÑANA.',
            'DEJA DE DESEARLO. EMPIEZA A HACERLO.',
            'LOS LÍMITES SOLO EXISTEN EN TU CABEZA.',
            'PEQUEÑOS PASOS TODOS LOS DÍAS.',
            'NADIE DIJO QUE SERÍA FÁCIL, DIJERON QUE VALDRÍA LA PENA.',
            'ENTRENA COMO SI TODO DEPENDIERA DE TI.',
            'EL HÁBITO ES MÁS FUERTE QUE LA MOTIVACIÓN.',
            'CUANDO QUIERAS RENDIRTE, RECUERDA POR QUÉ EMPEZASTE.',
            'LA FUERZA NO VIENE DE GANAR, VIENE DE NO RENDIRSE.',
            'HOY ODIAS EL ESFUERZO, MAÑANA AMARÁS EL RESULTADO.',
            'TU FUTURO SE CONSTRUYE CON LO QUE HACES HOY.',
            'NO CUENTES LAS REPS, HAZ QUE CADA REP CUENTE.',
            'CONVIERTE EL "NO PUEDO" EN "LO HICE".',
            'EL ÉXITO ES LA SUMA DE PEQUEÑOS ESFUERZOS REPETIDOS.',
            'CADA GOTA DE SUDOR ES UNA INVERSIÓN EN TI.',
            'LO QUE NO TE RETA, NO TE CAMBIA.',
            'SÉ MÁS FUERTE QUE TUS EXCUSAS.',
            'LA DISCIPLINA ES EL PUENTE ENTRE METAS Y LOGROS.',
        ];
        function setDailyQuote() {
            const i = Math.floor(Math.random() * QUOTES.length);
            document.getElementById('daily-quote').innerText = QUOTES[i];
        }

        // #5 Hitos: celebra al cruzar un umbral por primera vez.
        const MILESTONES = [7, 14, 30, 50, 75, 100];
        function checkMilestone(streak) {
            let celebrated = JSON.parse(localStorage.getItem('celebrated') || '[]');
            const hit = MILESTONES.find(m => streak >= m && !celebrated.includes(m));
            if (hit === undefined) return;
            celebrated.push(hit);
            localStorage.setItem('celebrated', JSON.stringify(celebrated));
            document.getElementById('milestone-num').innerText = hit;
            document.getElementById('milestone-msg').innerText = `¡${hit} DÍAS SEGUIDOS!`;
            document.getElementById('milestone-modal').classList.remove('hidden');
            if (navigator.vibrate) navigator.vibrate([80, 40, 120]);
            flashDone();
        }
        function closeMilestone() {
            document.getElementById('milestone-modal').classList.add('hidden');
        }

        // #3 Recordatorio. ponytail: solo dispara una notificación al abrir la app
        // si hoy sigue sin cerrarse. Un push diario real necesita servidor; YAGNI por ahora.
        // El interruptor propio (independiente del permiso del navegador).
        function remindersOn() { return localStorage.getItem('remindersOff') !== '1'; }

        function refreshNotifBtn() {
            const btn = document.getElementById('notif-btn');
            if (!('Notification' in window)) { btn.style.display = 'none'; return; }
            if (Notification.permission === 'denied') { btn.innerText = '🔕 RECORDATORIO BLOQUEADO'; return; }
            if (Notification.permission !== 'granted') { btn.innerText = '🔔 ACTIVAR RECORDATORIO'; return; }
            // Permiso concedido: el botón alterna activado/desactivado.
            btn.innerText = remindersOn() ? '🔔 RECORDATORIO ACTIVO (tocar para apagar)'
                                          : '🔕 RECORDATORIO APAGADO (tocar para encender)';
        }
        function enableReminders() {
            if (!('Notification' in window)) return;
            if (Notification.permission === 'granted') {
                // Ya hay permiso → solo alterna el interruptor.
                localStorage.setItem('remindersOff', remindersOn() ? '1' : '0');
                refreshNotifBtn();
                if (remindersOn()) maybeNotify();
                return;
            }
            Notification.requestPermission().then(() => {
                localStorage.setItem('remindersOff', '0'); // recién activado: encendido
                refreshNotifBtn();
                maybeNotify();
            });
        }
        function maybeNotify() {
            if (Notification.permission !== 'granted' || !remindersOn()) return;
            const t = history[today];
            const done = t && t.exercise !== null && t.food !== null;
            if (done) return;
            // Una sola vez al día.
            if (localStorage.getItem('lastNotify') === today) return;
            localStorage.setItem('lastNotify', today);
            new Notification('SISTEMA DE DISCIPLINA', { body: '¿Entrenaste hoy? Cierra el día 💪', icon: 'icon-192.png' });
        }

        // Tema: aplica el guardado y marca el botón activo.
        function setTheme(t) {
            document.documentElement.dataset.theme = t;
            localStorage.setItem('theme', t);
            document.querySelectorAll('.theme-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.themeVal === t));
        }
        setTheme(localStorage.getItem('theme') || 'matrix');

        setDailyQuote();
        refreshNotifBtn();
        updateUI();
        maybeNotify();

        // Sesión: pinta la barra y, si ya hay sesión (o vuelve del login Google),
        // baja los datos de la nube. onAuthStateChange cubre el retorno del OAuth.
        renderAuth();
        if (sb) {
            sb.auth.getSession().then(({ data }) => onAuth(data.session));
            sb.auth.onAuthStateChange((_e, session) => onAuth(session));
        }

        // Registra el service worker (necesario para instalar como app / offline).
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
